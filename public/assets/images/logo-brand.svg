<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
<defs>
    <linearGradient id="logoGrad" x1="150" y1="0" x2="150" y2="400" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#00F260"/>
        <stop offset="100%" stop-color="#00F260"/>
    </linearGradient>
    <style>
        .brand-name { font-family: 'Montserrat', 'Segoe UI', system-ui, sans-serif; font-weight: 900; font-size: 64px; }
        .tagline { font-family: 'Montserrat', 'Segoe UI', system-ui, sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 5px; fill: #64748B; }
    </style>
</defs>

<!-- Background -->
<rect width="500" height="500" fill="transparent" rx="40"/>

<!-- Logo Mark (Combined S and Dollar Sign) -->
<g transform="translate(250, 190) scale(0.75) translate(-250, -200)">
    <path d="M 250 15 L 250 10
             M 250 390 L 250 385
             M 305 130
             A 55 55 0 0 0 195 130
             C 195 190, 305 210, 305 270
             A 55 55 0 0 1 195 270"
          stroke="url(#logoGrad)" stroke-width="52" stroke-linecap="round" fill="none" filter="url(#glow)"/>
</g>

<!-- Brand Name with corrected Payroll color -->
<text x="250" y="405" class="brand-name" text-anchor="middle">
    <tspan fill="#00F260">S</tspan><tspan fill="#0A192F">Payroll</tspan>
</text>
</svg>
